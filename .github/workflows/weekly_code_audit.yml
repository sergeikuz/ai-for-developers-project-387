name: Weekly Code Audit
on:
  schedule:
    - cron: "15 17 * * 2" 
jobs:
  opencode:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: write
      pull-requests: write
      issues: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false
      - name: Run OpenCode
        uses: anomalyco/opencode/github@latest
        env:
          OPENCODE_API_KEY: ${{ secrets.OPENCODE_API_KEY }}
        with:
          model: opencode/qwen3.6-plus
          prompt: |
            Review the codebase for TODO, FIXME, and HACK comments.
            Group them by priority and create an issue with a summary.