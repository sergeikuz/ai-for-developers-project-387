name: ci-tests

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  lint-and-build:
    timeout-minutes: 10
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install frontend dependencies
        run: npm ci

      - name: Install TypeSpec dependencies
        run: cd typespec && npm install

      - name: Run ESLint
        run: npm run lint

      - name: Compile TypeSpec → OpenAPI
        run: cd typespec && npx tsp compile main.tsp

      - name: Generate TypeScript API client
        run: npx openapi-typescript-codegen --input typespec/tsp-output/openapi/openapi.yaml --output src/api/generated --client fetch

      - name: TypeScript typecheck
        run: npx tsc -b --noEmit

      - name: Build frontend
        run: npm run build

  backend-tests:
    timeout-minutes: 10
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install TypeSpec dependencies
        run: cd typespec && npm install

      - name: Compile TypeSpec → OpenAPI
        run: cd typespec && npx tsp compile main.tsp

      - name: Install backend dependencies
        run: cd backend && uv sync

      - name: Run backend tests
        run: cd backend && uv run pytest -v

  e2e-tests:
    timeout-minutes: 15
    runs-on: ubuntu-latest
    needs: [lint-and-build, backend-tests]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install frontend dependencies
        run: npm ci

      - name: Install TypeSpec dependencies
        run: cd typespec && npm install

      - name: Install backend dependencies
        run: cd backend && uv sync

      - name: Compile TypeSpec → OpenAPI
        run: cd typespec && npx tsp compile main.tsp

      - name: Generate TypeScript API client
        run: npx openapi-typescript-codegen --input typespec/tsp-output/openapi/openapi.yaml --output src/api/generated --client fetch

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run Playwright tests
        run: npx playwright test
        env:
          CI: true

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
